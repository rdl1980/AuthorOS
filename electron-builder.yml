# Configurazione packaging (electron-builder).
# Build: npm run dist (installer NSIS) oppure npm run dist:dir (cartella win-unpacked).
appId: com.rdl1980.authoros
productName: AuthorOS
copyright: © 2026 rdl1980

directories:
  output: release

# electron-vite compila in out/; package.json e i node_modules di produzione
# (sql.js, docx, jszip, mammoth, marked, drizzle-orm, sdk) entrano di default.
files:
  - out/**

# sql.js carica sql-wasm.wasm da filesystem a runtime: fuori dall'asar.
asarUnpack:
  - node_modules/sql.js/dist/*.wasm

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
  # US-32.3 (code signing): pronto all'uso — basta un certificato.
  # Con un certificato .pfx classico: esporta CSC_LINK (percorso/URL del .pfx)
  # e CSC_KEY_PASSWORD prima di `npm run dist`; electron-builder firma da solo.
  # Con un certificato EV/HSM o Azure Trusted Signing: decommenta e configura:
  # signtoolOptions:
  #   publisherName: rdl1980
  #   certificateSubjectName: rdl1980
  # verifyUpdateCodeSignature: true

# US-32.5 (macOS): configurazione pronta; la build .dmg va eseguita su un Mac
# (`npm run dist -- --mac`). L'icona .icns viene generata da build/icon.png.
mac:
  category: public.app-category.productivity
  icon: build/icon.png
  target:
    - target: dmg
      arch: [universal]
dmg:
  artifactName: AuthorOS-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  shortcutName: AuthorOS
  artifactName: AuthorOS-Setup-${version}.${ext}
  # Rileva una versione già installata e propone di disinstallarla prima.
  include: build/installer.nsh

# Auto-update via GitHub Releases (US-32.2): pubblicare la release con
# l'installer + latest.yml generati da `npm run dist` (electron-builder).
publish:
  provider: github
  owner: rdl1980
  repo: AuthorOS

# Niente firma del codice in questa fase (installer non firmato).
forceCodeSigning: false
